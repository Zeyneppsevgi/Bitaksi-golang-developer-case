services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  driver-location-service:
    build:
      context: ../driver-location-service
      dockerfile: Dockerfile
    environment:
      DRIVER_PORT: "8080"
      MONGO_URI: mongodb://mongo:27017
      MONGO_DB: driver_location
      MONGO_COLLECTION: driver_locations
      INTERNAL_API_KEY: some-secret
      SEED_ON_START: "true"
      SEED_FILE: data/drivers.csv
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  matching-service:
    build:
      context: ../matching-service
      dockerfile: Dockerfile
    environment:
      MATCHING_PORT: "8081"
      DRIVER_LOCATION_BASE_URL: http://driver-location-service:8080
      INTERNAL_API_KEY: some-secret
      USER_JWT_SECRET: user-secret
    depends_on:
      driver-location-service:
        condition: service_healthy
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8081/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongo_data:
