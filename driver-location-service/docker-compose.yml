services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  driver-location-service:
    build: .
    environment:
      DRIVER_PORT: "8080"
      MONGO_URI: mongodb://mongo:27017
      MONGO_DB: driver_location
      MONGO_COLLECTION: driver_locations
      INTERNAL_API_KEY: some-secret
      SEED_ON_START: "false"
    ports:
      - "8080:8080"
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  mongo_data:
