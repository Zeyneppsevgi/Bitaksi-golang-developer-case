openapi: 3.0.3
info:
  title: driver-location-service
  version: 1.0.0
servers:
  - url: http://localhost:8080
components:
  securitySchemes:
    InternalApiKey:
      type: apiKey
      in: header
      name: X-Internal-Api-Key
paths:
  /healthz:
    get:
      summary: Health
      responses:
        '200': { description: OK }
  /readyz:
    get:
      summary: Readiness
      responses:
        '200': { description: Ready }
        '503': { description: Not ready }
  /v1/driver-locations/batch:
    post:
      security: [{ InternalApiKey: [] }]
      summary: Bulk upsert locations
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                items:
                  type: array
                  items:
                    type: object
                    properties:
                      driverId: { type: string }
                      location:
                        type: object
                        properties:
                          type: { type: string, enum: [Point] }
                          coordinates:
                            type: array
                            minItems: 2
                            maxItems: 2
                            items: { type: number }
      responses:
        '200': { description: Upsert summary }
  /v1/driver-locations/import:
    post:
      security: [{ InternalApiKey: [] }]
      summary: Import CSV (driverId,longitude,latitude)
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file: { type: string, format: binary }
      responses:
        '200': { description: Import summary }
  /v1/driver-locations/search:
    get:
      security: [{ InternalApiKey: [] }]
      summary: Search nearest drivers
      parameters:
        - in: query
          name: lon
          required: true
          schema: { type: number }
        - in: query
          name: lat
          required: true
          schema: { type: number }
        - in: query
          name: radius_m
          required: true
          schema: { type: integer }
      responses:
        '200': { description: Search results }
