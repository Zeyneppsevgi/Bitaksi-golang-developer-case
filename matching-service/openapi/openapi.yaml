openapi: 3.0.3
info:
  title: matching-service
  version: 1.0.0
servers:
  - url: http://localhost:8081
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
paths:
  /healthz:
    get:
      summary: Health
      responses:
        '200': { description: OK }
  /v1/token:
    get:
      summary: Generate a test JWT token
      responses:
        '200': { description: Token generated }
        '500': { description: Internal server error }
  /v1/match:
    get:
      summary: Match nearest driver
      security: [{ BearerAuth: [] }]
      parameters:
        - in: query
          name: lon
          required: true
          schema: { type: number }
        - in: query
          name: lat
          required: true
          schema: { type: number }
        - in: query
          name: radius_m
          required: false
          schema: { type: integer, default: 3000 }
      responses:
        '200': { description: Match result }
        '401': { description: Unauthorized }
        '404': { description: Not found }
        '503': { description: Upstream unavailable }
